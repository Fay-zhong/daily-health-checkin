<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#8a7766" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="每日打卡" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>每日饮食运动打卡</title>
  <style>
    :root{
      --bg:#f7f3ef; --card:#fffdfb; --ink:#302a26; --muted:#81766e;
      --brand:#8a7766; --brand2:#b7a394; --line:#eadfd7; --good:#557761;
      --shadow:0 12px 35px rgba(75,57,45,.08);
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",
      "Hiragino Sans GB","Microsoft YaHei",sans-serif;
      background:linear-gradient(180deg,#f3ece6 0,#f9f6f3 240px,#f7f3ef 100%);
      color:var(--ink); min-height:100vh;
    }
    button,input,textarea,select{font:inherit}
    .app{max-width:720px;margin:auto;padding:18px 16px calc(90px + env(safe-area-inset-bottom))}
    .hero{padding:8px 4px 18px}
    .eyebrow{color:var(--brand);font-size:13px;font-weight:700;letter-spacing:.12em}
    h1{font-size:28px;margin:7px 0 5px;letter-spacing:-.04em}
    .sub{color:var(--muted);font-size:14px}
    .datebar{display:flex;gap:10px;align-items:center;margin-top:16px}
    .datebar input{flex:1}
    .card{
      background:rgba(255,253,251,.96); border:1px solid rgba(234,223,215,.85);
      border-radius:22px; padding:17px; margin:12px 0; box-shadow:var(--shadow)
    }
    .card h2{font-size:18px;margin:0 0 14px;display:flex;justify-content:space-between;align-items:center}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
    label{display:block;color:var(--muted);font-size:13px;margin-bottom:6px}
    input,textarea,select{
      width:100%; border:1px solid var(--line); background:#fff; border-radius:13px;
      padding:12px 13px; outline:none; color:var(--ink)
    }
    input:focus,textarea:focus,select:focus{border-color:var(--brand2);box-shadow:0 0 0 3px rgba(138,119,102,.10)}
    textarea{min-height:84px;resize:vertical}
    .meal{padding:12px 0;border-top:1px dashed var(--line)}
    .meal:first-of-type{border-top:0;padding-top:0}
    .meal-title{font-weight:700;margin-bottom:8px}
    .row{display:flex;gap:10px;align-items:center}
    .row > *{flex:1}
    .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:9px}
    .chip{
      border:1px solid var(--line); background:#fff; color:var(--muted);
      border-radius:999px;padding:8px 11px;font-size:13px;cursor:pointer
    }
    .chip.active{background:#eee5de;color:var(--brand);border-color:#d8c5b7;font-weight:700}
    .water-wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .water-btn{border:1px solid var(--line);background:white;border-radius:13px;padding:10px 6px;color:var(--brand)}
    .progress{height:10px;background:#eee5de;border-radius:999px;overflow:hidden;margin:12px 0 5px}
    .progress span{display:block;height:100%;background:linear-gradient(90deg,var(--brand2),var(--brand));width:0;transition:.25s}
    .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
    .metric{background:#f6f0eb;border-radius:15px;padding:12px;text-align:center}
    .metric b{display:block;font-size:18px;margin-bottom:2px}
    .metric small{color:var(--muted)}
    .actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}
    .btn{
      border:0;border-radius:14px;padding:12px 16px;font-weight:700;cursor:pointer
    }
    .primary{background:var(--brand);color:white;flex:1}
    .secondary{background:#eee5de;color:var(--brand)}
    .danger{background:#f7e7e5;color:#a4514b}
    .status{text-align:center;color:var(--good);font-size:13px;min-height:20px;margin-top:7px}
    .history-item{padding:12px 0;border-bottom:1px solid var(--line);cursor:pointer}
    .history-item:last-child{border:0}
    .history-top{display:flex;justify-content:space-between;font-weight:700}
    .history-note{color:var(--muted);font-size:13px;margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .empty{color:var(--muted);text-align:center;padding:20px 0}
    .footer-note{color:var(--muted);font-size:12px;text-align:center;margin-top:16px;line-height:1.6}
    @media(max-width:520px){
      h1{font-size:25px}.grid2{grid-template-columns:1fr}.summary{grid-template-columns:repeat(3,1fr)}
      .card{border-radius:19px;padding:15px}.app{padding-left:12px;padding-right:12px}
    }
  </style>
</head>
<body>
<main class="app">
  <header class="hero">
    <div class="eyebrow">DAILY RHYTHM</div>
    <h1>饮食 · 运动打卡</h1>
    <div class="sub">把白天零碎记录下来，晚上就不用努力回忆啦。</div>
    <div class="datebar">
      <input id="date" type="date" />
      <button class="btn secondary" onclick="goToday()">今天</button>
    </div>
  </header>

  <section class="card">
    <h2><span>今日状态</span><span>🌿</span></h2>
    <div class="grid2">
      <div><label>体重（kg）</label><input id="weight" type="number" step="0.05" placeholder="例如 63.5"></div>
      <div><label>睡眠（小时）</label><input id="sleep" type="number" step="0.1" placeholder="例如 7.5"></div>
    </div>
    <div style="margin-top:12px">
      <label>今天的身体感受</label>
      <div class="chips" id="moodChips">
        <button class="chip" data-value="精力很好">精力很好</button>
        <button class="chip" data-value="状态一般">状态一般</button>
        <button class="chip" data-value="有点累">有点累</button>
        <button class="chip" data-value="经期/不适">经期 / 不适</button>
      </div>
      <div style="margin-top:10px">
        <input id="moodCustom" type="text" maxlength="40" placeholder="其他感受，可以自己填写" />
      </div>
    </div>
  </section>

  <section class="card">
    <h2><span>饮食记录</span><span>🥣</span></h2>
    <div class="meal"><div class="meal-title">早餐</div><textarea id="breakfast" placeholder="吃了什么、大概分量，例如：鸡蛋2个 + 半个粢饭"></textarea></div>
    <div class="meal"><div class="meal-title">午餐</div><textarea id="lunch" placeholder="例如：半碗米饭 + 青菜 + 虾"></textarea></div>
    <div class="meal"><div class="meal-title">晚餐</div><textarea id="dinner" placeholder="例如：西兰花 + 猪肉，没吃主食"></textarea></div>
    <div class="meal"><div class="meal-title">加餐 / 咖啡 / 饮料</div><textarea id="snacks" placeholder="咖啡、气泡水、水果、零食等"></textarea></div>
  </section>

  <section class="card">
    <h2><span>饮水</span><span>💧</span></h2>
    <div class="water-wrap">
      <button class="water-btn" onclick="addWater(250)">+250 ml</button>
      <button class="water-btn" onclick="addWater(350)">+350 ml</button>
      <button class="water-btn" onclick="addWater(500)">+500 ml</button>
      <button class="water-btn" onclick="addWater(-250)">−250 ml</button>
    </div>
    <div class="progress"><span id="waterProgress"></span></div>
    <div class="row">
      <div><label>今日饮水（ml）</label><input id="water" type="number" step="50" value="0"></div>
      <div><label>目标（ml）</label><input id="waterGoal" type="number" step="100" value="2000"></div>
    </div>
  </section>

  <section class="card">
    <h2><span>运动记录</span><span>🏃‍♀️</span></h2>
    <div class="grid2">
      <div><label>中午训练类型</label>
        <select id="noonType">
          <option value="">未训练</option><option>核心</option><option>背部</option><option>手臂</option>
          <option>臀腿</option><option>Tabata</option><option>拉伸</option><option>其他</option>
        </select>
      </div>
      <div><label>中午时长（分钟）</label><input id="noonMinutes" type="number" min="0" placeholder="例如 20"></div>
      <div><label>晚上训练类型</label>
        <select id="eveningType">
          <option value="">未训练</option><option>有氧操</option><option>力量</option><option>快走</option>
          <option>拉伸</option><option>休息</option><option>其他</option>
        </select>
      </div>
      <div><label>晚上时长（分钟）</label><input id="eveningMinutes" type="number" min="0" placeholder="例如 30"></div>
    </div>
    <div style="margin-top:12px"><label>训练内容 / 感受</label><textarea id="exerciseNote" placeholder="例如：Tabata 8个动作×2组，第二组比较吃力"></textarea></div>
  </section>

  <section class="card">
    <h2><span>今日复盘</span><span>✨</span></h2>
    <textarea id="reflection" placeholder="今天做得不错的地方、明天想调整什么……"></textarea>
    <div class="summary" style="margin-top:13px">
      <div class="metric"><b id="sumMeals">0/4</b><small>饮食记录</small></div>
      <div class="metric"><b id="sumExercise">0</b><small>运动分钟</small></div>
      <div class="metric"><b id="sumWater">0%</b><small>饮水完成</small></div>
    </div>
    <div class="actions">
      <button class="btn primary" onclick="saveEntry()">保存今日记录</button>
      <button class="btn secondary" onclick="exportData()">导出备份</button>
      <label class="btn secondary" style="cursor:pointer">导入备份<input type="file" accept=".json" onchange="importData(event)" hidden></label>
      <button class="btn danger" onclick="clearCurrent()">清空本日</button>
    </div>
    <div class="status" id="status"></div>
  </section>

  <section class="card">
    <h2><span>最近记录</span><span>📅</span></h2>
    <div id="history"></div>
  </section>
  <div class="footer-note">数据仅保存在当前浏览器。建议偶尔点击“导出备份”，换手机或清理浏览器前尤其要备份。</div>
</main>

<script>
const fields = ["weight","sleep","breakfast","lunch","dinner","snacks","water","waterGoal",
  "noonType","noonMinutes","eveningType","eveningMinutes","exerciseNote","reflection"];
let selectedMood = "";
const $ = id => document.getElementById(id);
const todayStr = () => {
  const d = new Date(), off = d.getTimezoneOffset();
  return new Date(d.getTime()-off*60000).toISOString().slice(0,10);
};
function getAll(){ return JSON.parse(localStorage.getItem("fitnessEntries") || "{}"); }
function setAll(data){ localStorage.setItem("fitnessEntries", JSON.stringify(data)); }
function currentData(){
  const obj = {mood:selectedMood, updatedAt:new Date().toISOString()};
  fields.forEach(id => obj[id]=$(id).value);
  return obj;
}
function loadEntry(){
  const d = getAll()[$("date").value] || {};
  fields.forEach(id => $(id).value = d[id] ?? (id==="waterGoal" ? "2000" : id==="water" ? "0" : ""));
  selectedMood = d.mood || "";
  const presetMood = [...document.querySelectorAll(".chip")].some(c=>c.dataset.value===selectedMood);
  $("moodCustom").value = presetMood ? "" : selectedMood;
  document.querySelectorAll(".chip").forEach(c=>c.classList.toggle("active",c.dataset.value===selectedMood));
  updateSummary(); renderHistory(); $("status").textContent="";
}
function saveEntry(){
  const all=getAll(); all[$("date").value]=currentData(); setAll(all);
  $("status").textContent="已保存 ✓"; renderHistory();
  setTimeout(()=>$("status").textContent="",1800);
}
function clearCurrent(){
  if(!confirm("确定清空这一天的记录吗？")) return;
  const all=getAll(); delete all[$("date").value]; setAll(all); loadEntry();
}
function goToday(){ $("date").value=todayStr(); loadEntry(); }
function addWater(n){ $("water").value=Math.max(0,(Number($("water").value)||0)+n); updateSummary(); }
function updateSummary(){
  const meals=["breakfast","lunch","dinner","snacks"].filter(id=>$(id).value.trim()).length;
  const mins=(Number($("noonMinutes").value)||0)+(Number($("eveningMinutes").value)||0);
  const goal=Number($("waterGoal").value)||2000, water=Number($("water").value)||0;
  const pct=Math.max(0,Math.round(water/goal*100));
  $("sumMeals").textContent=meals+"/4"; $("sumExercise").textContent=mins; $("sumWater").textContent=pct+"%";
  $("waterProgress").style.width=Math.min(100,pct)+"%";
}
function renderHistory(){
  const all=getAll(), dates=Object.keys(all).sort().reverse().slice(0,14), box=$("history");
  if(!dates.length){ box.innerHTML='<div class="empty">还没有记录，从今天开始吧 🌱</div>'; return; }
  box.innerHTML=dates.map(date=>{
    const d=all[date], mins=(Number(d.noonMinutes)||0)+(Number(d.eveningMinutes)||0);
    const note=[d.breakfast,d.lunch,d.dinner,d.exerciseNote].filter(Boolean).join(" · ");
    return `<div class="history-item" onclick="openDate('${date}')">
      <div class="history-top"><span>${date}</span><span>${d.weight ? d.weight+" kg · " : ""}${mins} 分钟</span></div>
      <div class="history-note">${escapeHtml(note || "点击查看当天记录")}</div>
    </div>`;
  }).join("");
}
function openDate(date){ $("date").value=date; loadEntry(); window.scrollTo({top:0,behavior:"smooth"}); }
function escapeHtml(str){ return String(str).replace(/[&<>"']/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[s])); }
function exportData(){
  const blob=new Blob([JSON.stringify(getAll(),null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="饮食运动记录备份_"+todayStr()+".json"; a.click(); URL.revokeObjectURL(a.href);
}
function importData(e){
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const incoming=JSON.parse(reader.result);
      if(!incoming || Array.isArray(incoming) || typeof incoming!=="object") throw new Error();
      setAll({...getAll(),...incoming}); loadEntry(); $("status").textContent="备份导入成功 ✓";
    }catch{ alert("文件格式不正确，请选择本应用导出的 JSON 备份。"); }
  };
  reader.readAsText(file); e.target.value="";
}
document.querySelectorAll(".chip").forEach(chip=>chip.addEventListener("click",()=>{
  selectedMood = selectedMood===chip.dataset.value ? "" : chip.dataset.value;
  $("moodCustom").value = "";
  document.querySelectorAll(".chip").forEach(c=>c.classList.toggle("active",c.dataset.value===selectedMood));
}));
$("moodCustom").addEventListener("input",()=>{
  selectedMood = $("moodCustom").value.trim();
  document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
});
fields.forEach(id=>$(id).addEventListener("input",updateSummary));
$("date").addEventListener("change",loadEntry);
$("date").value=todayStr(); loadEntry();
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>
